<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسرى العسلي - نبراس - بشرى</title>
    <style>
        :root {
            --medical-blue: #00a8ff;
            --medical-green: #2ecc71;
            --alert-red: #e74c3c;
            --bg-light-gray: #f0f2f5; 
            --panel-white: #ffffff;
            --text-main: #2c3e50;
            --border-color: #d1d9e6;
        }

        body {
            background-color: var(--bg-light-gray);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }

        .device-frame {
            width: 100%;
            max-width: 450px;
            background: var(--panel-white);
            border: 4px solid var(--border-color);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            position: relative;
            box-sizing: border-box;
        }

        .heart-icon {
            font-size: 25px;
            color: var(--alert-red);
            animation: beat 0.8s infinite;
            display: inline-block;
            margin-bottom: 5px;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* جعل المربعات بجوار بعضها دائماً */
        .main-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .data-card {
            background: #f8fafc;
            padding: 12px 5px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .label { font-size: 0.75rem; color: var(--medical-blue); font-weight: bold; height: 35px; display: flex; align-items: center; justify-content: center; }
        .value { font-size: 2rem; font-weight: 800; margin: 5px 0; font-family: 'Courier New', monospace; }
        .unit { font-size: 0.7rem; opacity: 0.6; }

        /* تعديل الخط للجوالات الصغيرة جداً */
        @media (max-width: 360px) {
            .value { font-size: 1.6rem; }
            .label { font-size: 0.65rem; }
        }

        .ecg-container {
            height: 60px;
            margin: 20px 0;
            background: #eef2f7;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .ecg-line {
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, var(--medical-green) 50%, transparent 100%);
            background-size: 50% 100%;
            animation: moveLine 2s linear infinite;
            opacity: 0.8;
        }

        @keyframes moveLine {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .action-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-start {
            background: linear-gradient(45deg, var(--medical-blue), var(--medical-green));
            border: none;
            padding: 15px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.2);
            transition: 0.3s;
        }

        .btn-upload {
            background: #f0f2f5;
            border: 2px dashed var(--medical-blue);
            padding: 10px;
            border-radius: 12px;
            color: var(--medical-blue);
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .btn-print {
            background: #444;
            border: none;
            padding: 12px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: none; 
            transition: 0.3s;
        }

        .emergency-mode {
            background-color: #fff5f5 !important;
            animation: danger-glow 1s infinite alternate;
        }

        @keyframes danger-glow {
            from { border-color: var(--border-color); }
            to { border-color: var(--alert-red); box-shadow: 0 0 20px rgba(231, 76, 60, 0.2); }
        }

        .alert-banner {
            display: none;
            background: var(--alert-red);
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        #file-name {
            font-size: 0.75rem;
            color: #2ecc71;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        @media print {
            body * { visibility: hidden; }
            #device, #device * { visibility: visible; }
            .btn-start, .btn-print, .btn-upload { display: none !important; }
        }
    </style>
</head>
<body id="body-bg">

<div class="device-frame" id="device">
    <div class="screen-header">
        <div><span class="heart-icon">❤️</span> <strong>المراقب الذكي</strong></div>
        <div id="time" style="font-size: 0.75rem; opacity: 0.7;">12:00 PM</div>
    </div>

    <div class="main-display">
        <div class="data-card">
            <div class="label">ضغط الدم (SYS/DIA)</div>
            <div class="value" id="bp-val" style="color: var(--medical-blue);">--</div>
            <div class="unit">mmHg</div>
        </div>
        <div class="data-card">
            <div class="label">النبض (BPM)</div>
            <div class="value" id="hr-val" style="color: var(--medical-green);">--</div>
            <div class="unit">نبضة / دقيقة</div>
        </div>
    </div>

    <div class="ecg-container">
        <div class="ecg-line" id="ecg"></div>
    </div>

    <div id="file-name">✅ تم إرفاق الملف بنجاح</div>
    <div id="alert-msg" class="alert-banner">⚠️ تنبيه: قيم غير طبيعية!</div>

    <div class="action-area">
        <button class="btn-start" onclick="runDiagnostic()">ابدأ القياس الآن</button>
        
        <label for="file-input" class="btn-upload">
            📎 إرفاق مستند طبي
        </label>
        <input type="file" id="file-input" accept="image/*,application/pdf" style="display: none;" onchange="handleFile(this)">

        <button id="print-btn" class="btn-print" onclick="printReport()">🖨️ تحميل التقرير (PDF)</button>
        <div id="status" style="text-align: center; font-size: 0.75rem; color: #7f8c8d;">الجهاز جاهز</div>
    </div>
</div>

<script>
    function handleFile(input) {
        const fileNameDiv = document.getElementById('file-name');
        if (input.files && input.files[0]) {
            fileNameDiv.innerText = "✅ تم إرفاق: " + input.files[0].name;
            fileNameDiv.style.display = "block";
        }
    }

    function runDiagnostic() {
        const btn = document.querySelector('.btn-start');
        const printBtn = document.getElementById('print-btn');
        const status = document.getElementById('status');
        const bp = document.getElementById('bp-val');
        const hr = document.getElementById('hr-val');
        const body = document.getElementById('body-bg');
        const alertBanner = document.getElementById('alert-msg');

        btn.disabled = true;
        printBtn.style.display = "none";
        btn.innerText = "جاري التحليل...";
        status.innerText = "يرجى الثبات...";
        alertBanner.style.display = "none";
        body.classList.remove('emergency-mode');

        let timer = 0;
        const interval = setInterval(() => {
            bp.innerText = Math.floor(Math.random() * 50 + 80);
            hr.innerText = Math.floor(Math.random() * 40 + 60);
            timer++;
            if(timer > 15) clearInterval(interval);
        }, 100);

        setTimeout(() => {
            clearInterval(interval);
            const sys = Math.floor(Math.random() * (180 - 100) + 100);
            const dia = Math.floor(Math.random() * (110 - 60) + 60);
            const heartRate = Math.floor(Math.random() * (130 - 55) + 55);

            bp.innerText = `${sys}/${dia}`;
            hr.innerText = heartRate;
            btn.disabled = false;
            btn.innerText = "إعادة القياس";
            status.innerText = "اكتمل القياس";
            printBtn.style.display = "block"; 

            if (sys > 150 || sys < 95 || heartRate > 110 || heartRate < 55) {
                body.classList.add('emergency-mode');
                alertBanner.style.display = "block";
                status.innerText = "تنبيه طبي!";
            }
        }, 3000);
    }

    function printReport() {
        const timeNow = document.getElementById('time').innerText;
        const bpNow = document.getElementById('bp-val').innerText;
        const hrNow = document.getElementById('hr-val').innerText;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html lang="ar" dir="rtl">
            <head>
                <title>تقرير طبي</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 40px; text-align: right; line-height: 1.6; }
                    .header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
                    .result-box { margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
                    .value { font-size: 24px; font-weight: bold; color: #00a8ff; }
                    .footer { margin-top: 50px; font-size: 12px; color: #777; border-top: 1px solid #eee; padding-top: 10px; }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>تقرير القياس الحيوي الدوري</h1>
                    <p>التاريخ والوقت: ${new Date().toLocaleDateString('ar-EG')} | ${timeNow}</p>
                </div>
                
                <div class="result-box">
                    <p>ضغط الدم (SYS/DIA): <span class="value">${bpNow} mmHg</span></p>
                </div>
                <div class="result-box">
                    <p>معدل نبضات القلب: <span class="value" style="color:#2ecc71">${hrNow} BPM</span></p>
                </div>
                <div class="footer">
                    <p>تم استخراج هذا التقرير آلياً بواسطة نظام المراقب الذكي (أسرى العسلي - نبراس - بشرى).</p>
                </div>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
