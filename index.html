<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسرى العسلي - نبراس - بشرى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --medical-blue: #00a8ff;
            --medical-green: #2ecc71;
            --alert-red: #e74c3c;
            --bg-light-gray: #f0f2f5; 
            --panel-white: #ffffff;
            --text-main: #2c3e50;
            --border-color: #d1d9e6;
        }

        body {
            background-color: var(--bg-light-gray);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .device-frame {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-white);
            border: 4px solid var(--border-color);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .nav-icon {
            font-size: 1.4rem;
            color: var(--medical-blue);
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-icon:hover { transform: scale(1.1); }

        .screen-header {
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .split-container {
            display: none; 
            gap: 15px;
            animation: fadeIn 0.5s ease;
            flex-direction: row; 
        }

        .split-container.active { display: flex; }

        .report-side {
            flex: 1;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            min-width: 0; 
        }

        .chat-side {
            flex: 1.2; 
            background: #f8fafc;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            position: relative;
            min-height: 350px;
            min-width: 0;
        }

        #voice-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 20px;
            text-align: center;
        }

        #voice-overlay img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--medical-blue);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(0, 168, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 168, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 168, 255, 0); }
        }

        .main-display { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .data-card { background: #f8fafc; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border-color); }
        .value { font-size: 2.2rem; font-weight: 800; color: var(--medical-blue); }
        .ecg-container { height: 60px; margin: 20px 0; background: #eef2f7; border-radius: 10px; overflow: hidden; }
        .ecg-line { width: 200%; height: 100%; background: linear-gradient(90deg, transparent 0%, var(--medical-green) 50%, transparent 100%); background-size: 50% 100%; animation: moveLine 2s linear infinite; }

        @keyframes moveLine { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; }
        .message { background: #e1f5fe; padding: 8px 12px; border-radius: 12px; margin-bottom: 10px; width: fit-content; max-width: 90%; line-height: 1.4; }

        .chat-controls {
            padding: 8px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 6px; /* تقليل المسافة لتناسب العرض الأفقي */
            align-items: center;
            background: white;
            border-radius: 0 0 20px 20px;
            overflow: hidden; /* منع خروج العناصر */
        }

        /* تحسين صندوق الإدخال ليكون مرناً جداً */
        .chat-controls input { 
            flex: 1; 
            min-width: 0; /* مهم جداً للسماح للعنصر بالتقلص في Flexbox */
            padding: 8px 12px; 
            border-radius: 20px; 
            border: 1px solid #ccc; 
            outline: none; 
            font-size: 0.85rem; 
        }

        .icon-btn { cursor: pointer; color: var(--medical-blue); font-size: 1.1rem; flex-shrink: 0; }
        
        .btn-start { background: linear-gradient(45deg, var(--medical-blue), var(--medical-green)); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .btn-back { background: #f0f2f5; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px; border-radius: 10px; margin-top: 8px; cursor: pointer; font-weight: 600; width: 100%; font-size: 0.85rem; }

        @media (max-width: 600px) {
            .device-frame { padding: 10px; border-radius: 15px; }
            .split-container { gap: 8px; }
            .report-side, .chat-side { padding: 8px; border-radius: 12px; }
            .value { font-size: 1.4rem; }
            .message { font-size: 0.75rem; }
            h3 { font-size: 0.9rem; margin-bottom: 5px !important; }
            .chat-side { min-height: 250px; }
            .chat-controls { padding: 5px; }
            .chat-controls input { padding: 6px 10px; font-size: 0.8rem; }
            .icon-btn { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="device-frame">
    <div class="top-nav">
        <div class="nav-icon" title="المحادثات السابقة"><i class="fas fa-comments"></i></div>
        <div id="time" style="font-weight: bold; font-size: 0.9rem;">12:00 PM</div>
        <div class="nav-icon" title="الحساب الشخصي"><i class="fas fa-user-circle"></i></div>
    </div>

    <div class="screen-header">
        <strong><i class="fas fa-heartbeat" style="color:var(--alert-red)"></i> المراقب الذكي</strong>
    </div>

    <div id="initial-view">
        <div class="main-display">
            <div class="data-card">
                <div class="label">الضغط (SYS/DIA)</div>
                <div class="value" id="bp-val">--</div>
            </div>
            <div class="data-card">
                <div class="label">النبض (BPM)</div>
                <div class="value" id="hr-val">--</div>
            </div>
        </div>
        <div class="ecg-container">
            <div class="ecg-line"></div>
        </div>
        <button class="btn-start" id="start-btn" onclick="runDiagnostic()">بدء الفحص والتحليل</button>
    </div>

    <div class="split-container" id="results-view">
        <div class="report-side">
            <h3 style="color:var(--medical-blue); margin: 0 0 10px 0;">📋 التقرير</h3>
            <div id="report-content" style="flex-grow: 1; font-size: 0.85rem;"></div>
            
            <button onclick="window.print()" style="margin-top:10px; width:100%; padding:8px; border-radius:8px; border:none; background:var(--medical-blue); color:white; cursor:pointer; font-weight: bold; font-size: 0.8rem;">
                <i class="fas fa-print"></i> طباعة
            </button>
            <button class="btn-back" onclick="resetView()">
                <i class="fas fa-redo"></i> إعادة فحص
            </button>
        </div>

        <div class="chat-side">
            <div id="voice-overlay">
                <img src="osra.png" alt="واجهة المحادثة الصوتية">
                <p style="margin-top:10px; font-weight:bold; color:var(--medical-blue); font-size: 0.85rem;">نسمعك الآن...</p>
                <button onclick="stopVoiceChat()" style="background:var(--alert-red); color:white; border:none; padding:4px 12px; border-radius:12px; cursor:pointer; font-size: 0.75rem;">إغلاق</button>
            </div>

            <div class="chat-messages">
                <div class="message">مرحباً! لقد تم تحليل بياناتك. هل لديك أي استفسار طبي؟</div>
            </div>
            
            <div class="chat-controls">
                <label for="file-up" style="flex-shrink:0;"><i class="fas fa-paperclip icon-btn"></i></label>
                <input type="file" id="file-up" style="display:none">
                
                <input type="text" id="chat-input" placeholder="اسأل أسرى...">
                
                <i class="fas fa-paper-plane icon-btn" onclick="sendMessage()" title="إرسال" style="color: var(--medical-green);"></i>
                <i class="fas fa-microphone icon-btn" style="color:var(--alert-red)" onclick="startVoiceChat()" title="تحدث"></i>
            </div>
        </div>
    </div>
</div>

<script>
    function runDiagnostic() {
        const btn = document.getElementById('start-btn');
        btn.innerText = "جاري التحليل...";
        btn.disabled = true;

        setTimeout(() => {
            document.getElementById('initial-view').style.display = 'none';
            document.getElementById('results-view').classList.add('active');
            
            const sys = 118, dia = 79, hr = 72;
            document.getElementById('report-content').innerHTML = `
                <div style="border: 1px solid #eee; padding: 8px; border-radius: 8px; background: #fafafa;">
                    <p style="margin:3px 0;"><strong>الضغط:</strong> ${sys}/${dia}</p>
                    <p style="margin:3px 0;"><strong>النبض:</strong> ${hr} BPM</p>
                    <p style="color:var(--medical-green); font-weight:bold; margin:3px 0;">طبيعي</p>
                </div>
            `;
        }, 1500);
    }

    function resetView() {
        document.getElementById('results-view').classList.remove('active');
        document.getElementById('initial-view').style.display = 'block';
        const btn = document.getElementById('start-btn');
        btn.innerText = "بدء الفحص والتحليل";
        btn.disabled = false;
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        if(input.value.trim() !== "") {
            const chatBox = document.querySelector('.chat-messages');
            const userMsg = document.createElement('div');
            userMsg.className = "message";
            userMsg.style.background = "#e8f5e9";
            userMsg.style.marginRight = "auto";
            userMsg.innerText = input.value;
            chatBox.appendChild(userMsg);
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function startVoiceChat() {
        document.getElementById('voice-overlay').style.display = 'flex';
    }

    function stopVoiceChat() {
        document.getElementById('voice-overlay').style.display = 'none';
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
